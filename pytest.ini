[pytest]
log_file = logs/automation.log
log_file_mode = a
log_file_level = DEBUG
log_cli_level = INFO
log_file_format = %(asctime)s [%(levelname)5s] (%(filename)s:%(funcName)s:%(lineno)s): %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S %p
markers=
    smoke: smoke test suite
    regression: regression test suite
testpaths = tests
addopts = -ra